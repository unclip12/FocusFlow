<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
    <title>FocusFlow - AI Study Tracker</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#4f46e5">
    
    <!-- iOS PWA Settings -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="FocusFlow">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2907/2907253.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              primary: 'rgb(var(--color-primary) / <alpha-value>)',
              secondary: '#64748b',
              success: '#10b981',
              warning: '#f59e0b',
              danger: '#ef4444',
              background: 'rgb(var(--color-background) / <alpha-value>)',
              surface: 'rgb(var(--color-surface) / <alpha-value>)',
              // Dark mode specific helpers
              dark: {
                  bg: '#0f172a',
                  surface: '#1e293b',
                  border: '#334155',
                  text: '#f1f5f9',
                  muted: '#94a3b8'
              }
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            },
            screens: {
              'xs': '475px',
            },
            boxShadow: {
              '3d': '0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05), inset 0 1px 0 0 rgba(255, 255, 255, 0.6)',
              '3d-dark': '0 10px 15px -3px rgba(0, 0, 0, 0.5), inset 0 1px 0 0 rgba(255, 255, 255, 0.1)',
              'btn': '0 4px 0 0 rgb(0 0 0 / 0.15)',
              'btn-active': '0 0 0 0 transparent',
              'inner-3d': 'inset 0 2px 4px 0 rgb(0 0 0 / 0.05)',
            }
          },
        },
      };
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
      :root {
          --color-primary: 79 70 229; /* Default Indigo */
          --color-background: 241 245 249; /* Slightly darker slate for contrast */
          --color-surface: 255 255 255;
      }
      
      html.dark {
          --color-background: 10 15 30;
          --color-surface: 30 41 59;
      }

      body { 
          font-family: 'Inter', sans-serif; 
          background-color: rgb(var(--color-background));
          /* Deep gradient background for 3D objects to float on */
          background-image: 
            radial-gradient(at 0% 0%, rgba(var(--color-primary) / 0.15) 0px, transparent 50%),
            radial-gradient(at 100% 100%, rgba(16, 185, 129, 0.1) 0px, transparent 50%),
            linear-gradient(to bottom right, #f1f5f9, #e2e8f0);
          background-attachment: fixed;
          color: #1e293b;
          /* Handle safe areas for iPhone/iPad */
          padding-top: env(safe-area-inset-top);
          padding-bottom: env(safe-area-inset-bottom);
          padding-left: env(safe-area-inset-left);
          padding-right: env(safe-area-inset-right);
          min-height: 100vh;
          min-height: 100dvh;
          overscroll-behavior-y: none; /* Prevent pull-to-refresh on mobile */
      }

      html.dark body {
          background-image: 
            radial-gradient(at 0% 0%, rgba(var(--color-primary) / 0.1) 0px, transparent 50%),
            radial-gradient(at 100% 100%, rgba(16, 185, 129, 0.05) 0px, transparent 50%),
            linear-gradient(to bottom right, #0f172a, #1e293b);
          color: #f1f5f9;
      }

      /* Custom scrollbar for webkit */
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
      html.dark ::-webkit-scrollbar-thumb { background: #475569; }
      
      /* Hide scrollbar util */
      .hide-scrollbar::-webkit-scrollbar {
          display: none;
      }
      .hide-scrollbar {
          -ms-overflow-style: none;
          scrollbar-width: none;
      }
      
      /* Ensure inputs don't zoom on iOS */
      input, select, textarea {
          font-size: 16px !important;
      }
      @media (min-width: 640px) {
          input, select, textarea {
              font-size: 0.875rem !important; /* 14px on desktop/tablet is fine */
          }
      }

      /* 3D Effect Classes */
      .card-3d {
        background: linear-gradient(145deg, #ffffff, #f8fafc);
        box-shadow: 
          0 10px 15px -3px rgba(0,0,0,0.1), 
          0 4px 6px -2px rgba(0,0,0,0.05), 
          inset 0 1px 0 0 rgba(255,255,255,0.8),
          0 1px 0 0 rgba(255,255,255,0.5) inset;
        border: 1px solid rgba(203, 213, 225, 0.6);
        border-bottom: 4px solid rgba(203, 213, 225, 0.6);
      }
      html.dark .card-3d {
        background: linear-gradient(145deg, #1e293b, #0f172a);
        box-shadow: 
          0 10px 15px -3px rgba(0,0,0,0.5), 
          inset 0 1px 0 0 rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.05);
        border-bottom: 4px solid rgba(0,0,0,0.3);
      }

      /* Physical Button with Press Effect */
      .btn-3d {
        transition: all 0.1s cubic-bezier(0.4, 0, 0.2, 1);
        box-shadow: 0 4px 0 0 rgba(0,0,0,0.15);
        transform: translateY(0);
        position: relative;
        top: 0;
      }
      .btn-3d:active:not(:disabled) {
        transform: translateY(4px);
        box-shadow: 0 0 0 0 transparent;
        top: 4px; /* Explicitly move down */
      }
      .btn-3d:disabled {
        opacity: 0.6;
        cursor: not-allowed;
        box-shadow: none;
        transform: none;
      }
      
      .btn-3d-primary {
        background: linear-gradient(to bottom, #6366f1, #4f46e5);
        box-shadow: 0 4px 0 0 #3730a3;
        border: 1px solid #4338ca;
      }
      .btn-3d-primary:active {
        box-shadow: 0 0 0 0 transparent;
      }

      /* Recessed Inputs */
      .input-3d {
        background-color: #f1f5f9;
        box-shadow: inset 0 2px 4px 0 rgba(0,0,0,0.06);
        border: 1px solid transparent;
        border-bottom: 1px solid rgba(255,255,255,0.5);
        transition: all 0.2s;
      }
      html.dark .input-3d {
        background-color: #0f172a;
        box-shadow: inset 0 2px 4px 0 rgba(0,0,0,0.5);
        border-bottom: 1px solid rgba(255,255,255,0.05);
      }
      .input-3d:focus {
        background-color: #ffffff;
        border-color: #6366f1;
        box-shadow: inset 0 2px 4px 0 rgba(0,0,0,0.06), 0 0 0 3px rgba(99, 102, 241, 0.2);
      }
      html.dark .input-3d:focus {
        background-color: #1e293b;
      }

    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@18.2.0",
    "react/": "https://esm.sh/react@18.2.0/",
    "react-dom": "https://esm.sh/react-dom@18.2.0",
    "react-dom/": "https://esm.sh/react-dom@18.2.0/",
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.30.0",
    "recharts": "https://esm.sh/recharts@2.12.7?deps=react@18.2.0,react-dom@18.2.0",

    "firebase/auth": "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js",
    "firebase/firestore": "https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js",
    "firebase/storage": "https://www.gstatic.com/firebasejs/10.14.1/firebase-storage.js",
    "firebase/messaging": "https://www.gstatic.com/firebasejs/10.14.1/firebase-messaging.js",
    "firebase/": "https://aistudiocdn.com/firebase@^12.6.0/"
  }
}
</script>
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
